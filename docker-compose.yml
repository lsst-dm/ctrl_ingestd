version: "3.7"

services:
  ingestd:
    container_name: ingestd
    environment:
        - CTRL_INGESTD_CONFIG=/home/lsst/ctrl_ingestd/etc/ingester.yml
    image: ingestd:${CTRL_INGESTD_VERSION}
    extra_hosts:
        - "kafka:127.0.0.1"
    build:
      context: ./ingestd
      args:
        - LSST_STACK_VERSION
        - CTRL_INGESTD_GIT_VERSION
        - CONFLUENT_KAFKA_VERSION
    network_mode: "host"
  testenv-ingestd:
    container_name: testenv-ingestd
    environment:
        - CTRL_INGESTD_CONFIG=/home/lsst/ctrl_ingestd/etc/ingester.yml
    image: testenv-ingestd:${CTRL_INGESTD_VERSION}
    extra_hosts:
        - "kafka:127.0.0.1"
    build:
      context: ./testenv-ingestd
      args:
        - LSST_STACK_VERSION
        - CTRL_INGESTD_GIT
        - CONFLUENT_KAFKA_VERSION
    volumes:
      - /tmp:/tmp/
      - ${HOME}/work/ctrl_ingestd:/home/lsst/ctrl_ingestd
    network_mode: "host"
